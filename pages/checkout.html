<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
</head>

<body class="bg-light">

    <nav class="navbar bg-dark navbar-expand-lg navbar-dark mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="#">SKILLBOOST</a>
            <div class="collapse navbar-collapse justify-content-end">
                <ul class="navbar-nav align-items-center gap-3">
                    <li class="nav-item"><a class="nav-link fw-bold" href="home.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold" href="courses.html">Courses</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold" href="my_courses.html">my courses</a></li>
                    <li class="nav-item"><a class="btn btn-light rounded-pill px-4" href="login.html">Login</a></li>
                    <li class="nav-item"><a class="btn btn-light rounded-pill px-4 bg-opacity-25 border-0 text-dark"
                            href="signup.html">Sign
                            Up</a></li>
                </ul>
            </div>
        </div>
    </nav>


    <main class="container py-5 mb-5">
        <div class="row g-5 justify-content-center">

            <div class="col-lg-7">
                <div class="card border-0 shadow-lg rounded-4 p-5">
                    <h2 class="fw-bold mb-4">Checkout</h2>

                    <form>
                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold mb-2">Card Type</label>
                            <div class="d-flex gap-3 justify-content-between align-items-center col-11">
                                <div class="p-3 border rounded shadow-sm flex-fill text-center"
                                    style="cursor: pointer;"><img src="../images/pay.png" alt="PayPal" height="25">
                                </div>

                                <div class="p-3 border rounded shadow-sm flex-fill text-center"
                                    style="cursor: pointer;"><img src="../images/visa.jpeg" alt="Visa" height="25">
                                </div>
                                <div class="p-3 border rounded shadow-sm flex-fill text-center"
                                    style="cursor: pointer;"><img
                                        src="https://upload.wikimedia.org/wikipedia/commons/a/a4/Mastercard_2019_logo.svg"
                                        alt="MasterCard" height="25"></div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="cardName" class="form-label text-muted small fw-bold">Name on Card</label>
                            <input type="text" class="form-control rounded-pill py-2 px-3" id="cardName"
                                placeholder="Enter name on Card">
                        </div>

                        <div class="mb-3">
                            <label for="cardNumber" class="form-label text-muted small fw-bold">Card Number</label>
                            <input type="text" class="form-control rounded-pill py-2 px-3" id="cardNumber"
                                placeholder="Enter Card Number">
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-7">
                                <label for="expiration" class="form-label text-muted small fw-bold">Expiration Date (
                                    MM/YY )</label>
                                <input type="text" class="form-control rounded-pill py-2 px-3" id="expiration"
                                    placeholder="Enter Expiration Date">
                            </div>
                            <div class="col-md-5">
                                <label for="cvc" class="form-label text-muted small fw-bold">CVC</label>
                                <input type="text" class="form-control rounded-pill py-2 px-3" id="cvc"
                                    placeholder="Enter CVC">
                            </div>
                        </div>

                        <div class="form-check mb-5 mt-4">
                            <input class="form-check-input" type="checkbox" id="saveInfo">
                            <label class="form-check-label text-muted small" for="saveInfo">
                                Save my information for faster checkout
                            </label>
                        </div>

                        <button type="submit"
                            class="btn btn-info text-white rounded-pill btn-lg w-100 fw-bold py-3 shadow-sm border-0 mt-3">Confirm
                            Payment</button>
                    </form>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card border-0 rounded-4 p-4 shadow-sm" style="background-color: #e6f7f6;">
                    <h5 class="fw-bold text-dark mb-4">Summary</h5>

                    <div
                        class="d-flex align-items-start gap-3 mb-3 pb-3 border-bottom border-secondary border-opacity-25">
                        <img src="https://via.placeholder.com/80x50" class="rounded img-fluid" alt="Course Image">
                        <div class="flex-grow-1">
                            <p class="text-dark small fw-bold mb-0">adipising elit, sed do eiusmod tempor</p>
                            <p class="text-muted small mb-1">lorem ipsum dolor...</p>
                            <p class="text-dark fw-bold mb-0">$24.69</p>
                        </div>
                    </div>

                    <div class="d-flex align-items-start gap-3 mb-4">
                        <img src="https://via.placeholder.com/80x50" class="rounded img-fluid" alt="Course Image">
                        <div class="flex-grow-1">
                            <p class="text-dark small fw-bold mb-0">sed do eiusmod tempor adipising elit</p>
                            <p class="text-muted small mb-1">lorem ipsum dolor...</p>
                            <p class="text-dark fw-bold mb-0">$24.69</p>
                        </div>
                    </div>

                    <div
                        class="list-unstyled text-muted small opacity-75 d-grid gap-2 border-top border-secondary border-opacity-25 pt-4">
                        <div class="d-flex justify-content-between align-items-center"><span
                                class="fw-bold">Subtotal</span><span class="text-dark fw-bold">$51.38</span></div>
                        <div class="d-flex justify-content-between align-items-center"><span class="fw-bold">Coupon
                                Discount</span><span class="text-dark fw-bold">0 %</span></div>
                        <div class="d-flex justify-content-between align-items-center mb-1"><span
                                class="fw-bold">TAX</span><span class="text-dark fw-bold">5</span></div>
                        <div class="border-top border-secondary border-opacity-25 mb-1 pt-2"></div>
                        <div class="d-flex justify-content-between align-items-center text-dark fs-6 fw-bold">
                            <span>Total</span><span>$56.38</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
